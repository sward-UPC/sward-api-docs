name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Validacion basica del portal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que index.html existe
        run: test -f index.html

      - name: Verificar referencia al CDN de Scalar
        run: grep -q "@scalar/api-reference" index.html

      - name: Verificar que existen las 6 fuentes
        run: |
          count=$(grep -c "openapi.json" index.html)
          echo "Fuentes openapi.json encontradas: $count"
          test "$count" -ge 6

      - name: Lint HTML (html-validate)
        run: npx --yes html-validate index.html || true
