<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWARD API - Portal de Documentacion</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <!-- Contenedor donde Scalar monta el portal -->
    <div id="app"></div>

    <!-- Componente Scalar via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>

    <script>
      /**
       * Portal de documentacion unificado del sistema SWARD.
       *
       * Arquitectura:
       *   Browser (GitHub Pages)
       *     → GET https://cloudfront.net/api/v1/auth/openapi.json
       *     → CloudFront Function: quita /api/v1 → /auth/openapi.json
       *     → ALB enruta /auth* → ms-usuarios
       *     → FastAPI sirve el schema (openapi_url="/auth/openapi.json")
       *
       * CORS: gestionado en CloudFront (ResponseHeadersPolicy).
       * Los microservicios no necesitan configuracion CORS adicional.
       *
       * Gateway: https://d2z5yyv5sjm9sz.cloudfront.net
       */

      const GATEWAY_BASE_URL = 'https://d2z5yyv5sjm9sz.cloudfront.net';
      const API_V1 = GATEWAY_BASE_URL + '/api/v1';

      Scalar.createApiReference('#app', {
        sources: [
          {
            title: 'ms-usuarios (auth / users / admin)',
            slug: 'ms-usuarios',
            url: API_V1 + '/auth/openapi.json',
            default: true,
          },
          {
            title: 'ms-integracion-lms (lms)',
            slug: 'ms-integracion-lms',
            url: API_V1 + '/lms/openapi.json',
          },
          {
            title: 'ms-trazabilidad (interactions / students / dashboard)',
            slug: 'ms-trazabilidad',
            url: API_V1 + '/interactions/openapi.json',
          },
          {
            title: 'ms-cursos-recursos (courses / resources)',
            slug: 'ms-cursos-recursos',
            url: API_V1 + '/courses/openapi.json',
          },
          {
            title: 'ms-recomendacion (recommendations)',
            slug: 'ms-recomendacion',
            url: API_V1 + '/recommendations/openapi.json',
          },
          {
            title: 'ms-xai (xai)',
            slug: 'ms-xai',
            url: API_V1 + '/xai/openapi.json',
          },
        ],
        theme: 'default',
        layout: 'modern',
        hideDownloadButton: false,
        metaData: {
          title: 'SWARD API - Portal de Documentacion',
          description:
            'Documentacion unificada de los 6 microservicios del sistema SWARD.',
        },
      });
    </script>
  </body>
</html>
