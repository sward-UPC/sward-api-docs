<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SWARD API - Portal de Documentacion</title>
    <link rel="icon" href="data:," />
    <style>
      html, body { margin: 0; padding: 0; background: #0f1117; }
      * {
        scrollbar-width: thin;
        scrollbar-color: #2a2d3e #0f1117;
      }
      *::-webkit-scrollbar { width: 6px; height: 6px; }
      *::-webkit-scrollbar-track { background: #0f1117; }
      *::-webkit-scrollbar-thumb { background-color: #2a2d3e; border-radius: 3px; }
      *::-webkit-scrollbar-thumb:hover { background-color: #6366f1; }
      ::selection { background-color: #6366f133; color: #f1f5f9; }

      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #94a3b8;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        gap: 10px;
      }
      #loading::before {
        content: '';
        width: 16px;
        height: 16px;
        border: 2px solid #2a2d3e;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">Cargando documentacion...</div>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      const GATEWAY_BASE_URL = 'https://d2z5yyv5sjm9sz.cloudfront.net';
      const API_V1 = GATEWAY_BASE_URL + '/api/v1';

      const SERVICES = [
        { title: 'ms-usuarios — Auth / Users / Admin',              slug: 'ms-usuarios',        path: '/auth/openapi.json',            default: true },
        { title: 'ms-integracion-lms — LMS',                       slug: 'ms-integracion-lms', path: '/lms/openapi.json'                           },
        { title: 'ms-trazabilidad — Interactions / Students / Dashboard', slug: 'ms-trazabilidad',   path: '/interactions/openapi.json'                  },
        { title: 'ms-cursos-recursos — Courses / Resources',        slug: 'ms-cursos-recursos', path: '/courses/openapi.json'                       },
        { title: 'ms-recomendacion — Recommendations',              slug: 'ms-recomendacion',   path: '/recommendations/openapi.json'               },
        { title: 'ms-xai — Explainability (XAI)',                   slug: 'ms-xai',             path: '/xai/openapi.json'                           },
      ];

      /*
       * Pre-fetcheamos cada spec e inyectamos el campo `servers` con la URL
       * correcta de produccion. FastAPI no lo expone por defecto, lo que hace
       * que Scalar no sepa el base URL y lo muestre incorrecto.
       */
      async function loadSources() {
        return Promise.all(
          SERVICES.map(async (svc) => {
            const spec = await fetch(API_V1 + svc.path).then((r) => r.json());
            spec.servers = [
              { url: API_V1, description: 'Produccion (CloudFront)' },
            ];
            return {
              title: svc.title,
              slug: svc.slug,
              spec,
              ...(svc.default ? { default: true } : {}),
            };
          })
        );
      }

      loadSources().then((sources) => {
        document.getElementById('loading').remove();

        Scalar.createApiReference('#app', {
          sources,

          theme: 'none',
          darkMode: true,
          defaultDarkMode: true,
          layout: 'modern',
          searchHotKey: 'k',

          /*
           * customCss es la unica forma de aplicar variables CSS dentro del
           * contexto de renderizado de Scalar. Un <style> externo no funciona.
           * Paleta tomada 1:1 de sward-frontend/src/styles/theme.css (.dark).
           */
          customCss: `
            :root {
              --scalar-color-1: #f1f5f9;
              --scalar-color-2: #94a3b8;
              --scalar-color-3: #64748b;
              --scalar-color-accent: #6366f1;

              --scalar-background-1: #0f1117;
              --scalar-background-2: #1a1d27;
              --scalar-background-3: #252836;
              --scalar-border-color: #2a2d3e;

              --scalar-sidebar-background-1: #1a1d27;
              --scalar-sidebar-color-1: #f1f5f9;
              --scalar-sidebar-color-2: #94a3b8;
              --scalar-sidebar-color-accent: #6366f1;
              --scalar-sidebar-border-color: #2a2d3e;

              --scalar-button-1: #6366f1;
              --scalar-button-1-color: #ffffff;
              --scalar-button-1-hover: #4f46e5;

              --scalar-color-green: #10b981;
              --scalar-color-red: #ef4444;
              --scalar-color-yellow: #f59e0b;
              --scalar-color-blue: #3b82f6;
              --scalar-color-purple: #8b5cf6;

              --scalar-input-background: #1a1d27;
              --scalar-input-border-color: #2a2d3e;
              --scalar-input-color: #f1f5f9;

              --scalar-border-radius: 0.75rem;
              --scalar-border-radius-lg: 0.75rem;
              --scalar-border-radius-xl: 1rem;
            }

            * {
              scrollbar-width: thin;
              scrollbar-color: #2a2d3e #0f1117;
            }
            *::-webkit-scrollbar { width: 6px; height: 6px; }
            *::-webkit-scrollbar-track { background: #0f1117; }
            *::-webkit-scrollbar-thumb { background-color: #2a2d3e; border-radius: 3px; }
            *::-webkit-scrollbar-thumb:hover { background-color: #6366f1; }
            ::selection { background-color: #6366f133; color: #f1f5f9; }
          `,

          authentication: {
            http: { bearer: { token: '' } },
          },

          defaultHttpClient: {
            targetKey: 'python',
            clientKey: 'requests',
          },
          hiddenClients: [
            'ruby', 'php', 'java', 'c', 'objc', 'swift',
            'kotlin', 'r', 'ocaml', 'csharp', 'go', 'clojure',
            'powershell', 'http',
          ],

          hideDownloadButton: false,
          metaData: {
            title: 'SWARD API - Portal de Documentacion',
            description: 'Documentacion unificada de los 6 microservicios del sistema SWARD.',
          },
        });
      });
    </script>
  </body>
</html>
